[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/reddit-proxy/*"
  to = "https://www.reddit.com/:splat"
  status = 200
  force = true
  headers = { Host = "www.reddit.com", User-Agent = "HappinessGlobalScout/1.0.0 (by Admin)" }

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
